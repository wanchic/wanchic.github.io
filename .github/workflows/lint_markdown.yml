name: 🧹 Markdown (mdl)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mdl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Ruby (bundler cache)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run mdl
        run: |
          files=$(git ls-files '*.md' ':!:vendor/**')
          if [ -n "$files" ]; then
            bundle exec mdl $files
          fi
